name: conda-docs

on:
  push:
    branches:
      - main
      - dev

jobs:
  condarise:
    name: 🐍 Condarise
    if: "startsWith(github.event.head_commit.message, 'Bump version:')"
    uses: tidywf/.github/.github/workflows/condarise.yaml@main
    permissions:
      contents: write
    with:
      pkg_name: r6toplant
      pkg_version: '0.0.0.9002' # bump
    secrets: inherit

  tag:
    name: 🔖 Tag
    needs: [condarise]
    uses: tidywf/.github/.github/workflows/tag.yaml@main
    permissions:
      contents: write
    with:
      pkg_version: '0.0.0.9002' # bump
    secrets: inherit

